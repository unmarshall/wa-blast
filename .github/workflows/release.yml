name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  id-token: write  # Required for npm Trusted Publishing (OIDC)

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Build binaries
        run: npm run build:pkg

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Sync package.json version with tag
        run: npm version ${GITHUB_REF_NAME#v} --no-git-tag-version

      - name: Rename binaries with version
        run: |
          mv binaries/wa-blast-macos  binaries/wa-blast-${{ steps.version.outputs.VERSION }}-macos-x64
          mv binaries/wa-blast-linux  binaries/wa-blast-${{ steps.version.outputs.VERSION }}-linux-x64
          mv binaries/wa-blast-win.exe binaries/wa-blast-${{ steps.version.outputs.VERSION }}-win-x64.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.VERSION }}
          body: |
            ## Installation

            ### Option 1 — npm (requires Node.js 20+)
            ```bash
            npm install -g wa-blast
            ```

            ### Option 2 — Standalone binary (no Node.js required)
            Download the binary for your OS below, make it executable, and run it directly.

            **macOS / Linux:**
            ```bash
            chmod +x wa-blast-*-macos-x64   # or linux-x64
            ./wa-blast-*-macos-x64 --help
            ```

            **Windows:**
            Open a terminal (cmd or PowerShell) in the download folder:
            ```
            wa-blast-${{ steps.version.outputs.VERSION }}-win-x64.exe --help
            ```

            ## Usage
            ```bash
            wa-blast --csv contacts.csv --msg "Hello {name}!"
            ```
            See the [README](https://github.com/unmarshall/wa-blast#readme) for full documentation.
          files: |
            binaries/wa-blast-${{ steps.version.outputs.VERSION }}-macos-x64
            binaries/wa-blast-${{ steps.version.outputs.VERSION }}-linux-x64
            binaries/wa-blast-${{ steps.version.outputs.VERSION }}-win-x64.exe
          draft: false
          prerelease: false

      - name: Publish to npm (Trusted Publishing)
        run: npm publish --provenance --access public
